services:
  # ── Backend — FastAPI ─────────────────────────────────────────────────────
  - type: web
    name: video-magic-api
    runtime: python
    region: oregon
    plan: starter             # 512 MB RAM — Veo polling is pure I/O; ffmpeg peaks ~250 MB
                              # Upgrade to standard ($25) only if ffmpeg OOMs on 60s videos
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: .
    healthCheckPath: /health
    envVars:
      - key: RENDER_PYTHON_VERSION
        value: "3.12.0"
      - key: GEMINI_API_KEY
        sync: false          # set in Render dashboard
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: nPczCjzI2devNBz1zQrb
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_10S
        sync: false
      - key: STRIPE_PRICE_30S
        sync: false
      - key: STRIPE_PRICE_60S
        sync: false
      - key: APP_URL
        value: https://videomagic.servicevision.io
      - key: CORS_ORIGINS
        value: https://videomagic.servicevision.io
      - key: STORAGE_DIR
        value: /opt/render/project/storage/projects
      - key: DATABASE_PATH
        value: /opt/render/project/video_magic.db
    disk:
      name: video-magic-storage
      mountPath: /opt/render/project/storage
      sizeGB: 1               # 1 GB at $0.25/mo — holds ~20 test videos; scale when needed

  # ── Frontend — Next.js ────────────────────────────────────────────────────
  - type: web
    name: video-magic-frontend
    runtime: node
    region: oregon
    plan: starter             # 512 MB RAM — Next.js SSR is fine at this scale
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        sync: false           # set in Render dashboard to https://<video-magic-api>.onrender.com
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false           # same value as BACKEND_URL
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /create
      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /create
